    const NODES = [
      { id: 'wlc', label: 'WLC\n(Wireless CP)', icon: 'fa-tower-broadcast', x: 17, y: 25 },
      { id: 'ise', label: 'ISE\n(Policy/Radius)', icon: 'fa-user-check', x: 35, y: 25 },
      { id: 'ad', label: 'Active Directory\n(Identity DB)', icon: 'fa-users', x: 53, y: 25 },
      { id: 'ipam', label: 'IPAM\n(DHCP/DNS)', icon: 'fa-database', x: 70, y: 25 },
      { id: 'user', label: '단말\n(Endpoint)', icon: 'fa-laptop', x: 5, y: 70 },
      { id: 'ap', label: 'Fabric AP\n(Local Mode)', icon: 'fa-wifi', x: 17, y: 70 },
      { id: 'edge', label: 'Edge Node\n(Anycast GW)', icon: 'fa-network-wired', x: 33, y: 70 },
      { id: 'border_cp', label: 'Border / CP\n(Proxy ETR)', icon: 'fa-server', icon2: 'fa-microchip', x: 60, y: 70 },
      { id: 'fusion', label: 'Fusion Router\n(VRF Leaking)', icon: 'fa-route', x: 77, y: 70 },
      { id: 'fw', label: 'NGFW\n(TrustSec/NAT)', icon: 'fa-shield-halved', x: 93, y: 70 }
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [logs, setLogs] = useState([]);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const logContainerRef = useRef(null);

      useEffect(() => {
        if (currentStep > 0) {
          setLogs(FLOW_STEPS.slice(1, currentStep + 1));
        } else {
          setLogs([]);
        }
      }, [currentStep]);

      // 자동 스크롤
      useEffect(() => {
        if (logContainerRef.current) {
          logContainerRef.current.scrollTop = logContainerRef.current.scrollHeight;
        }
      }, [logs]);

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => {
            setCurrentStep(prev => {
              if (prev >= FLOW_STEPS.length - 1) {
                setIsPlaying(false);
                return prev;
              }
              return prev + 1;
            });
          }, 4000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const handleNext = () => {
        if (currentStep < FLOW_STEPS.length - 1) {
          setCurrentStep(prev => prev + 1);
        }
      };

      const handlePrev = () => {
        if (currentStep > 0) {
          setCurrentStep(prev => prev - 1);
        }
      };

      const handleReset = () => {
        setIsPlaying(false);
        setCurrentStep(0);
      };

      const activeStepData = FLOW_STEPS[currentStep];

      const highlightText = (text) => {
        const parts = text.split(/(L[23] VN|L[23] VNI|VRF|VRF-Lite|SGT|VXLAN-GPO|LISP|EID|RLOC|CAPWAP|TrustSec|Device Tracking|AD|Active Directory|LDAP|Kerberos|RADIUS)/g);
        return parts.map((part, index) => {
          if (['L2 VN', 'L2 VNI'].includes(part)) {
            return <span key={index} className="text-cyan-300 font-bold bg-cyan-900/30 px-1 rounded">{part}</span>;
          } else if (['L3 VN', 'L3 VNI', 'VRF', 'VRF-Lite'].includes(part)) {
            return <span key={index} className="text-orange-300 font-bold bg-orange-900/30 px-1 rounded">{part}</span>;
          } else if (part === 'SGT' || part === 'TrustSec') {
            return <span key={index} className="text-pink-300 font-bold bg-pink-900/30 px-1 rounded">{part}</span>;
          } else if (part === 'VXLAN-GPO') {
            return <span key={index} className="text-green-300 font-bold bg-green-900/30 px-1 rounded">{part}</span>;
          } else if (['LISP', 'EID', 'RLOC'].includes(part)) {
            return <span key={index} className="text-purple-300 font-bold bg-purple-900/30 px-1 rounded">{part}</span>;
          } else if (['CAPWAP', 'Device Tracking'].includes(part)) {
            return <span key={index} className="text-blue-300 font-bold bg-blue-900/30 px-1 rounded">{part}</span>;
          } else if (['AD', 'Active Directory', 'LDAP', 'Kerberos'].includes(part)) {
            return <span key={index} className="text-yellow-300 font-bold bg-yellow-900/30 px-1 rounded">{part}</span>;
          } else if (part === 'RADIUS') {
            return <span key={index} className="text-indigo-300 font-bold bg-indigo-900/30 px-1 rounded">{part}</span>;
          }
          return part;
        });
      };

      return (
        <div className="min-h-screen bg-slate-950 text-slate-200 p-4 font-sans flex flex-col">
          <header className="mb-5 border-b border-slate-800 pb-4 flex justify-between items-end">
            <div>
              <h1 className="text-2xl font-bold text-blue-400 flex items-center gap-3">
                <i className="fa-solid fa-list-ol text-3xl text-yellow-400"></i>
                SD-Access 트래픽 플로우 세밀 시뮬레이터 (12단계 & 트러블슈팅)
              </h1>
              <p className="text-slate-400 text-sm mt-2 max-w-4xl">
                단말의 802.1X 접속부터 방화벽 외부 전송까지 12단계 흐름을 분석하며, 각 단계에서 장비에 접속하여 상태를 확인할 수 있는 실무 CLI 명령어를 제공합니다.
              </p>
            </div>
            <div className="bg-slate-900 border border-slate-700 px-4 py-2 rounded-lg text-center hidden md:block">
              <span className="text-xs text-slate-400 block mb-1">현재 진행 단계</span>
              <span className="text-xl font-bold text-blue-400">{currentStep} / 12</span>
            </div>
          </header>

          {/* 시각화 캔버스 영역 */}
          <div className="relative w-full bg-slate-900 rounded-xl border border-slate-800 shadow-2xl overflow-hidden mb-6" style={{ height: '480px', minHeight: '480px' }}>
            
            {/* SVG 연결선 */}
            <svg className="absolute inset-0 w-full h-full pointer-events-none">
              <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                  <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
                </marker>
                <marker id="arrowhead-active" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                  <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
                </marker>
                <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                  <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7" />
                </marker>
                <marker id="arrowhead-purple-light" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                  <polygon points="0 0, 10 3.5, 0 7" fill="#d8b4fe" />
                </marker>
                <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                  <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e" />
                </marker>
                <marker id="arrowhead-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                  <polygon points="0 0, 10 3.5, 0 7" fill="#06b6d4" />
                </marker>
                <marker id="arrowhead-pink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                  <polygon points="0 0, 10 3.5, 0 7" fill="#f472b6" />
                </marker>
                <marker id="arrowhead-yellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                  <polygon points="0 0, 10 3.5, 0 7" fill="#eab308" />
                </marker>
              </defs>

              <line x1="5%" y1="70%" x2="17%" y2="70%" stroke={(currentStep >= 1 && currentStep <= 5) ? "#3b82f6" : "#334155"} strokeWidth="3" markerEnd={(currentStep >= 1 && currentStep <= 5) ? "url(#arrowhead-active)" : "url(#arrowhead)"} className="transition-colors duration-500" />
              <line x1="17%" y1="70%" x2="33%" y2="70%" stroke={(currentStep >= 5 && currentStep <= 6) ? "#22d3ee" : "#334155"} strokeWidth="3" markerEnd={(currentStep >= 5 && currentStep <= 6) ? "url(#arrowhead-cyan)" : "url(#arrowhead)"} className="transition-colors duration-500" />
              <line x1="33%" y1="70%" x2="60%" y2="70%" stroke={currentStep >= 10 ? "#22c55e" : "#334155"} strokeWidth={currentStep >= 10 ? "5" : "3"} markerEnd={currentStep >= 10 ? "url(#arrowhead-green)" : "url(#arrowhead)"} className="transition-all duration-500" />
              <line x1="60%" y1="70%" x2="77%" y2="70%" stroke={currentStep >= 11 ? "#f97316" : "#334155"} strokeWidth="3" markerEnd={currentStep >= 11 ? "url(#arrowhead-active)" : "url(#arrowhead)"} className="transition-colors duration-500" />
              <line x1="77%" y1="70%" x2="93%" y2="70%" stroke={currentStep >= 12 ? "#ef4444" : "#334155"} strokeWidth="3" markerEnd={currentStep >= 12 ? "url(#arrowhead-active)" : "url(#arrowhead)"} className="transition-colors duration-500" />
              
              <line x1="17%" y1="70%" x2="17%" y2="25%" stroke={currentStep === 1 ? "#3b82f6" : currentStep === 4 ? "#f472b6" : "#334155"} strokeWidth="2.5" strokeDasharray="6,4" markerEnd={currentStep === 1 ? "url(#arrowhead-active)" : currentStep === 4 ? "url(#arrowhead-pink)" : "url(#arrowhead)"} className="transition-colors duration-500" />
              <line x1="17%" y1="25%" x2="35%" y2="25%" stroke={currentStep === 2 ? "#818cf8" : currentStep === 4 ? "#f472b6" : "#334155"} strokeWidth="3" markerEnd={currentStep === 2 ? "url(#arrowhead-active)" : currentStep === 4 ? "url(#arrowhead-pink)" : "url(#arrowhead)"} className="transition-colors duration-500" />
              <line x1="35%" y1="25%" x2="53%" y2="25%" stroke={currentStep === 3 ? "#eab308" : "#334155"} strokeWidth="3" markerEnd={currentStep === 3 ? "url(#arrowhead-yellow)" : "url(#arrowhead)"} className="transition-colors duration-500" />
              <line x1="35%" y1="25%" x2="33%" y2="70%" stroke={currentStep === 4 ? "#f472b6" : "transparent"} strokeWidth="2" strokeDasharray="4,4" markerEnd={currentStep === 4 ? "url(#arrowhead-pink)" : ""} className="transition-colors duration-500" />
              <line x1="33%" y1="70%" x2="70%" y2="25%" stroke={currentStep === 6 ? "#06b6d4" : "#334155"} strokeWidth="2.5" strokeDasharray="5,5" markerEnd={currentStep === 6 ? "url(#arrowhead-cyan)" : "url(#arrowhead)"} className="transition-colors duration-500" />
              
              <path d="M 33 70 Q 46.5 40 60 70" fill="none" stroke={currentStep === 8 ? "#e879f9" : "transparent"} strokeWidth="2.5" strokeDasharray="6,4" markerEnd={currentStep === 8 ? "url(#arrowhead-purple)" : ""} className="transition-colors duration-500" vectorEffect="non-scaling-stroke" />
              <path d="M 33 70 Q 46.5 100 60 70" fill="none" stroke={currentStep === 7 ? "#a855f7" : currentStep === 9 ? "#d8b4fe" : "transparent"} strokeWidth="2.5" strokeDasharray="6,4" markerEnd={currentStep === 7 ? "url(#arrowhead-purple)" : currentStep === 9 ? "url(#arrowhead-purple-light)" : ""} className="transition-colors duration-500" vectorEffect="non-scaling-stroke" />
            </svg>

            {/* 노드 (장비) 렌더링 */}
            {NODES.map((node) => {
              let isActive = false;
              if (currentStep === 0 && node.id === 'user') isActive = true;
              if (currentStep === 1 && ['user', 'ap', 'wlc'].includes(node.id)) isActive = true;
              if (currentStep === 2 && ['wlc', 'ise'].includes(node.id)) isActive = true;
              if (currentStep === 3 && ['ise', 'ad'].includes(node.id)) isActive = true; 
              if (currentStep === 4 && ['ise', 'wlc', 'ap', 'edge'].includes(node.id)) isActive = true;
              if (currentStep === 5 && ['user', 'ap', 'edge'].includes(node.id)) isActive = true;
              if (currentStep === 6 && ['edge', 'ipam'].includes(node.id)) isActive = true;
              if (currentStep === 7 && ['edge', 'border_cp'].includes(node.id)) isActive = true;
              if (currentStep === 8 && ['edge', 'border_cp'].includes(node.id)) isActive = true;
              if (currentStep === 9 && ['edge', 'border_cp'].includes(node.id)) isActive = true;
              if (currentStep === 10 && ['edge', 'border_cp'].includes(node.id)) isActive = true;
              if (currentStep === 11 && ['border_cp', 'fusion'].includes(node.id)) isActive = true;
              if (currentStep === 12 && ['fusion', 'fw'].includes(node.id)) isActive = true;

              const isAd = node.id === 'ad';
              const nodeColorClass = isAd && isActive ? 'border-yellow-500 shadow-[0_0_25px_rgba(234,179,8,0.5)]' : 
                                     isActive ? 'border-blue-500 shadow-[0_0_25px_rgba(59,130,246,0.5)]' : 'border-slate-800';

              return (
                <div 
                  key={node.id}
                  className={`absolute flex flex-col items-center justify-center transform -translate-x-1/2 -translate-y-1/2 transition-all duration-300 ${isActive ? 'scale-110 opacity-100 z-10' : 'scale-100 opacity-40 z-0'}`}
                  style={{ left: `${node.x}%`, top: `${node.y}%` }}
                >
                  <div className={`p-4 rounded-xl flex items-center justify-center gap-2 border-2 ${isActive ? 'bg-slate-800' : 'bg-slate-800/60 border-opacity-50'} ${nodeColorClass}`}>
                    <i className={`fa-solid ${node.icon} text-3xl ${isActive && isAd ? 'text-yellow-400' : isActive ? 'text-blue-400' : 'text-slate-500'}`}></i>
                    {node.icon2 && <i className={`fa-solid ${node.icon2} text-xl ${isActive ? 'text-purple-400' : 'text-slate-600'}`}></i>}
                  </div>
                  <span className="mt-2 text-[10px] sm:text-[11px] font-semibold text-center whitespace-pre-line leading-snug bg-slate-900/90 px-2 py-1.5 rounded-md border border-slate-800 text-slate-300 shadow-md">
                    {node.label}
                  </span>
                </div>
              );
            })}

            {/* 애니메이션 패킷 플로우 아이콘 */}
            <div 
              className={`absolute transform -translate-x-1/2 -translate-y-1/2 transition-all duration-700 ease-in-out z-20 flex flex-col items-center ${activeStepData.showPacket ? 'opacity-100 scale-100' : 'opacity-0 scale-50'}`}
              style={{ left: `${activeStepData.packetPos.x}%`, top: `${activeStepData.packetPos.y}%` }}
            >
              <div className="mb-2 text-[11px] font-bold bg-white text-slate-900 px-3 py-1.5 rounded-md shadow-[0_4px_12px_rgba(0,0,0,0.8)] whitespace-nowrap border-b-2 border-slate-400">
                {activeStepData.packetLabel}
              </div>
              <div className={`w-5 h-5 rounded-full shadow-[0_0_20px_currentColor] animate-ping opacity-70 absolute bottom-0 ${activeStepData.color}`}></div>
              <div className={`w-5 h-5 rounded-full shadow-[0_0_10px_currentColor] relative ${activeStepData.color}`}></div>
            </div>
          </div>

          {/* 컨트롤, 정보 및 검증 영역 */}
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 flex-1">
            
            {/* 아키텍처 로그 및 제어 패널 (왼쪽) */}
            <div className="lg:col-span-5 bg-slate-900 p-5 rounded-xl border border-slate-800 flex flex-col h-[40rem]">
              <div className="flex justify-between items-center mb-4">
                <h2 className="text-lg font-bold flex items-center gap-2 text-slate-200">
                  <i className="fa-solid fa-layer-group text-purple-400 text-xl"></i>
                  Architecture Log
                </h2>
              </div>
              
              <div ref={logContainerRef} className="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar mb-4">
                {logs.length === 0 ? (
                  <div className="text-slate-500 text-sm italic flex h-full items-center justify-center text-center px-4">
                    시뮬레이션을 시작하면 아키텍처 동작 로그가 이곳에 기록됩니다.
                  </div>
                ) : (
                  logs.map((log) => (
                    <div key={log.id} className="bg-slate-950/60 p-3 rounded-lg border border-slate-800/80 flex gap-4 animate-fade-in shadow-sm hover:border-slate-700 transition-colors">
                      <div className={`mt-1 w-6 h-6 rounded-full flex items-center justify-center text-[12px] font-bold text-slate-900 shrink-0 shadow-md ${log.color}`}>
                        {log.id}
                      </div>
                      <div>
                        <h4 className="text-[13.5px] font-bold text-slate-200 mb-1">{log.title}</h4>
                        <p className="text-[12.5px] text-slate-400 leading-relaxed font-mono tracking-tight">
                          {highlightText(log.desc)}
                        </p>
                      </div>
                    </div>
                  ))
                )}
              </div>

              {/* 제어 버튼 영역 */}
              <div className="flex flex-col gap-3 mt-auto pt-4 border-t border-slate-800">
                <div className="flex gap-2">
                  <button 
                    onClick={handleNext}
                    disabled={currentStep >= FLOW_STEPS.length - 1 || isPlaying}
                    className="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-lg flex items-center justify-center gap-2 font-semibold transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-blue-900/50"
                  >
                    <i className="fa-solid fa-forward-step"></i> 다음 단계
                  </button>
                  <button 
                    onClick={handlePrev}
                    disabled={currentStep === 0 || isPlaying}
                    className="w-20 flex-shrink-0 py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-lg flex items-center justify-center transition-colors border border-slate-700 disabled:opacity-50 disabled:cursor-not-allowed"
                    title="이전 단계"
                  >
                    이전
                  </button>
                </div>
                <div className="flex gap-2">
                  <button 
                    onClick={() => setIsPlaying(!isPlaying)}
                    disabled={currentStep >= FLOW_STEPS.length - 1}
                    className={`flex-1 py-3 rounded-lg flex items-center justify-center gap-2 font-semibold transition-all disabled:opacity-50 disabled:cursor-not-allowed ${isPlaying ? 'bg-amber-600 hover:bg-amber-500 text-white shadow-lg shadow-amber-900/50' : 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-lg shadow-emerald-900/50'}`}
                  >
                    {isPlaying ? '일시 정지' : <><i className="fa-solid fa-play"></i> 자동 재생</>}
                  </button>
                  <button 
                    onClick={handleReset}
                    className="w-20 flex-shrink-0 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-lg flex items-center justify-center transition-colors"
                    title="초기화"
                  >
                    <i className="fa-solid fa-rotate-left"></i>
                  </button>
                </div>
              </div>
            </div>

            {/* 검증 명령어 및 예시 패널 (오른쪽 분리) */}
            <div className="lg:col-span-7 flex flex-col gap-6 h-[40rem]">
              
              {/* 검증 명령어 (Commands Only) */}
              <div className="bg-slate-900 p-5 rounded-xl border border-slate-800 flex flex-col h-[30%] shrink-0">
                <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-slate-200">
                  <i className="fa-solid fa-terminal text-emerald-400 text-xl"></i>
                  검증 명령어
                </h2>
                <div className="bg-slate-950/80 p-4 rounded-lg border border-slate-700/60 flex-1 relative overflow-hidden flex flex-col">
                  <div className="absolute top-0 left-0 w-1 h-full bg-emerald-500 rounded-l-lg"></div>
                  <pre className="text-emerald-300 text-[13px] font-mono whitespace-pre-wrap leading-relaxed bg-black/30 p-3 rounded border border-emerald-900/30 ml-2 overflow-auto custom-scrollbar">
                    {activeStepData.verificationCmd}
                  </pre>
                </div>
              </div>

              {/* 검증 명령어 예시 (Examples Only) */}
              <div className="bg-slate-900 p-5 rounded-xl border border-slate-800 flex flex-col flex-1 min-h-0">
                <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-slate-200 shrink-0">
                  <i className="fa-solid fa-file-lines text-blue-400 text-xl"></i>
                  검증 명령어 예시
                </h2>
                <div className="bg-slate-950/80 p-4 rounded-lg border border-slate-700/60 flex-1 relative flex flex-col min-h-0">
                  <div className="absolute top-0 left-0 w-1 h-full bg-blue-500 rounded-l-lg"></div>
                  <pre className="text-blue-300 text-[12px] font-mono whitespace-pre leading-relaxed bg-black/30 p-4 rounded border border-blue-900/30 ml-2 flex-1 overflow-auto custom-scrollbar min-h-0">
                    {activeStepData.verificationExample || "해당 단계의 출력 예시 데이터가 없습니다."}
                  </pre>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
